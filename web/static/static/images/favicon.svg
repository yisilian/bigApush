<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="64" height="64" fill="#1e3a8a" rx="8"/>
  
  <!-- 猎手的头部 -->
  <polygon points="32,8 44,24 20,24" fill="#2563eb"/>
  
  <!-- 猎手的身体 -->
  <rect x="28" y="24" width="8" height="16" fill="#2563eb"/>
  
  <!-- K线图表 -->
  <g transform="translate(32, 40)">
    <!-- K线1 -->
    <line x1="-10" y1="-2" x2="-10" y2="6" stroke="#10b981" stroke-width="1"/>
    <rect x="-12" y="-2" width="4" height="4" fill="#10b981"/>
    
    <!-- K线2 -->
    <line x1="0" y1="-5" x2="0" y2="4" stroke="#ef4444" stroke-width="1"/>
    <rect x="-2" y="-3" width="4" height="3" fill="#ef4444"/>
    
    <!-- K线3 -->
    <line x1="10" y1="0" x2="10" y2="8" stroke="#10b981" stroke-width="1"/>
    <rect x="8" y="2" width="4" height="4" fill="#10b981"/>
  </g>
  
  <!-- 上升箭头 -->
  <polygon points="48,20 52,28 44,28" fill="#10b981"/>
</svg>
